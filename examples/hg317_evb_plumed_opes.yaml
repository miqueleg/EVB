project:
  name: hg317-evb-plumed-opes
  output_dir: outputs/hg317_evb_plumed_opes
reaction:
  metadata:
    name: HG3.17 Kemp eliminase EVB PLUMED OPES
    phase: enzyme
    temperature_k: 300.0
    pressure_bar: 1.0
    notes: PLUMED biases geometrical CVs only; the EVB energy gap remains a native OpenMM observable.
  atoms:
    donor: 4548
    proton: 4555
    acceptor: 1954
  substrate_atoms: [4540, 4541, 4542, 4543, 4544, 4545, 4546, 4547, 4548, 4549, 4550, 4551, 4552, 4553, 4554, 4555]
states:
  state1:
    topology: prep/hg317_full_irc/evb_ready/state1_evb_ready/system.xml
    coordinates: prep/hg317_full_irc/evb_ready/state1_evb_ready/coordinates.pdb
    format: openmm
  state2:
    topology: prep/hg317_full_irc/evb_ready/state2_evb_ready/system.xml
    coordinates: prep/hg317_full_irc/evb_ready/state2_evb_ready/coordinates.pdb
    format: openmm
evb:
  coupling_model:
    model: constant
    parameters:
      delta_alpha_kj_mol: 307.1983003827954
      h12_kj_mol: 568.4342017631922
sampling:
  mode: mapping
  integrator:
    name: LangevinMiddle
    timestep_fs: 0.5
    friction_per_ps: 1.0
    seed: 31726
  md:
    production_steps: 200000
    report_stride: 500
    save_stride: 5000
    platform: CUDA
    temperature_k: 300.0
    nonbonded_method: PME
    constraints: None
    minimize_steps: 100
  windows:
    mapping:
      lambda_values: [0.5]
plumed:
  enabled: true
  mode: opes
  restart: true
  output_colvar: COLVAR
  script: |
    # PLUMED atom indices are 1-based. OpenMM/Python indices are 0-based.
    # OPES here biases the proton-transfer geometry, not the internal EVB gap.
    d_donor_h: DISTANCE ATOMS=4549,4556
    d_h_acceptor: DISTANCE ATOMS=4556,1955
    pt_rc: COMBINE ARG=d_donor_h,d_h_acceptor COEFFICIENTS=1,-1 PERIODIC=NO
    opes: OPES_METAD ARG=pt_rc PACE=500 SIGMA=0.02 BARRIER=40 TEMP=300 STATE_WFILE=STATE STATE_WSTRIDE=1000
    PRINT ARG=d_donor_h,d_h_acceptor,pt_rc,opes.bias,opes.rct,opes.neff,opes.nker FILE=COLVAR STRIDE=500
observables:
  gap:
    shifted: true
  reaction_coordinates:
  - name: proton_transfer_rc
    kind: difference_of_distances
    atom1: 4548
    atom2: 4555
    atom3: 1954
  distances:
  - name: donor_h
    atom1: 4548
    atom2: 4555
  - name: h_acceptor
    atom1: 4555
    atom2: 1954
