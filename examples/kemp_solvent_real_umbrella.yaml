project:
  name: kemp-solvent-real-umbrella
  output_dir: outputs/kemp_solvent_real_umbrella
reaction:
  metadata:
    name: kemp_substrate_formicacid_water_real_umbrella
    phase: solution
    temperature_k: 300.0
    pressure_bar: 1.0
    notes: Gap-umbrella EVB baseline for the synced RC/PROD solvent system with a shared periodic box.
  atoms:
    donor: 6
    proton: 15
    acceptor: 19
states:
  state1:
    topology: outputs/prepared_systems/kemp_solvent_boxsynced/RC.prmtop
    coordinates: outputs/prepared_systems/kemp_solvent_boxsynced/RC.pdb
    format: amber
  state2:
    topology: outputs/prepared_systems/kemp_solvent_boxsynced/PROD.prmtop
    coordinates: outputs/prepared_systems/kemp_solvent_boxsynced/PROD.pdb
    format: amber
evb:
  coupling_model:
    model: constant
    parameters:
      delta_alpha_kj_mol: 0.0
      h12_kj_mol: 20.0
sampling:
  mode: gap_umbrella
  integrator:
    name: LangevinMiddle
    timestep_fs: 0.5
    friction_per_ps: 1.0
    seed: 2026
  md:
    equilibration_steps: 100
    production_steps: 400
    report_stride: 10
    save_stride: null
    platform: CPU
    temperature_k: 300.0
    nonbonded_method: PME
    constraints: None
    minimize_steps: 500
    minimize_tolerance: 10.0
  windows:
    gap_umbrella:
      centers_kj_mol: [-25000.0, -20000.0, -15000.0, -10000.0, -5000.0, 0.0, 5000.0]
      force_constant_kj_mol2: 0.002
observables:
  gap:
    shifted: true
  distances:
    - name: donor_h
      atom1: 6
      atom2: 15
    - name: h_acceptor
      atom1: 15
      atom2: 19
analysis:
  histogram:
    bin_min_kj_mol: -50000.0
    bin_max_kj_mol: 50000.0
    n_bins: 200
  pmf:
    temperature_k: 300.0
    zero_mode: reactant_min
  barrier:
    reactant_region: [-50000.0, -5000.0]
    product_region: [5000.0, 50000.0]
