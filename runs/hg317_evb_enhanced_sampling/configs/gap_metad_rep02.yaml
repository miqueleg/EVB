project:
  name: hg317-evb-gap-metad-rep02
  output_dir: outputs/hg317_evb_gap_metad/rep02
start_coordinates: outputs/hg317_evb_ready_final_gap_pmf/rep03/windows/u069/final_state.pdb
reaction:
  metadata:
    name: HG3.17 Kemp eliminase native EVB gap metadynamics
    phase: enzyme
    temperature_k: 300.0
    pressure_bar: 1.0
    notes: Native OpenMM well-tempered metadynamics on gap = E1 - E2 - delta_alpha.
  atoms:
    donor: 4548
    proton: 4555
    acceptor: 1954
  substrate_atoms: [4540, 4541, 4542, 4543, 4544, 4545, 4546, 4547, 4548, 4549, 4550, 4551, 4552, 4553, 4554, 4555]
states:
  state1:
    topology: prep/hg317_full_irc/evb_ready/state1_evb_ready/system.xml
    coordinates: prep/hg317_full_irc/evb_ready/state1_evb_ready/coordinates.pdb
    format: openmm
  state2:
    topology: prep/hg317_full_irc/evb_ready/state2_evb_ready/system.xml
    coordinates: prep/hg317_full_irc/evb_ready/state2_evb_ready/coordinates.pdb
    format: openmm
evb:
  coupling_model:
    model: constant
    parameters:
      delta_alpha_kj_mol: 307.1983003827954
      h12_kj_mol: 568.4342017631922
sampling:
  mode: gap_metadynamics
  integrator:
    name: LangevinMiddle
    timestep_fs: 0.25
    friction_per_ps: 5.0
    seed: 31702
  md:
    production_steps: 20000000
    report_stride: 1000
    save_stride: 10000
    platform: CUDA
    temperature_k: 300.0
    nonbonded_method: PME
    constraints: None
    minimize_steps: 100
  metadynamics:
    cv: gap
    # kJ/mol. This covers the observed E1 basin and the EVB mixing region.
    min_value: -25000.0
    max_value: 25000.0
    bias_width: 750.0
    height_kj_mol: 1.0
    bias_factor: 15.0
    frequency: 1000
    save_frequency: 10000
    bias_dir: /home/mestevez/Projects/EVB/EVB/outputs/hg317_evb_gap_metad/shared_bias
    wall_force_constant_kj_mol2: 0.000001
    convergence_check_interval: 50000
    convergence_tolerance_kj_mol: 1.0
    convergence_consecutive_checks: 3
    convergence_min_steps: 1000000
    convergence_ts_window_kj_mol: 1500.0
    convergence_min_ts_samples: 200
    convergence_min_weight2: 0.2
    convergence_min_mixing_samples: 100
    convergence_mixing_weight2_min: 0.2
    convergence_mixing_weight2_max: 0.8
observables:
  gap:
    shifted: true
  reaction_coordinates:
  - name: proton_transfer_rc
    kind: difference_of_distances
    atom1: 4548
    atom2: 4555
    atom3: 1954
  distances:
  - name: donor_h
    atom1: 4548
    atom2: 4555
  - name: h_acceptor
    atom1: 4555
    atom2: 1954
