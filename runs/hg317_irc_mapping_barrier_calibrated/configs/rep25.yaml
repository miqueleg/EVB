      atom1: 4548
      atom2: 4555
    - name: h_acceptor
      atom1: 4555
      atom2: 1954
analysis:
  histogram:
    bin_min_kj_mol: -100000.0
    bin_max_kj_mol: 300000.0
    n_bins: 500
  pmf:
    temperature_k: 300.0
    zero_mode: reactant_min
  uncertainty:
