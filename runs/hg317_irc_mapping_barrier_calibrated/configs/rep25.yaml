project:
  name: hg317-irc-mapping-barrier-calibrated-rep25
  output_dir: outputs/hg317_irc_mapping_barrier_calibrated_replicates/rep25
reaction:
  metadata:
    name: hg317_irc_mapping_barrier_calibrated_rep25
    phase: enzyme
    temperature_k: 300.0
    pressure_bar: 1.0
    notes: >
      HG3.17 matched AMBER-state mapped-Hamiltonian PMF. Constant-H12 EVB is calibrated to the g-xTB IRC barrier.
  atoms:
    donor: 4548
    proton: 4555
    acceptor: 1954
  substrate_atoms: [4540, 4541, 4542, 4543, 4544, 4545, 4546, 4547, 4548, 4549, 4550, 4551, 4552, 4553, 4554, 4555]
states:
  state1:
    topology: prep/hg317_full_irc/state1_reactant_matched16.prmtop
    coordinates: prep/hg317_full_irc/state1_reactant.inpcrd
